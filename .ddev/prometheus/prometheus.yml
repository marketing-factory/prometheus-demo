global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s
      api_version: v2
scrape_configs:
  - job_name: prometheus
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: https
    # Prometheus does not trust DDEV's certificate authority, hence skip TLS verification
    tls_config:
      insecure_skip_verify: true
    # List all targets to scrape (incl. DDEV setups)
    static_configs:
      - targets:
          - example.ddev.site
